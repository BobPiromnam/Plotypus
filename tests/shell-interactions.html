<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plotypus shell interaction smoke</title>
  <style>
    html, body { height: 100%; margin: 0; font: 14px system-ui, sans-serif; }
    #app { display: block; width: 100%; height: 100%; border: 0; }
    #result { position: fixed; left: 8px; bottom: 8px; z-index: 10; width: 320px; max-height: 112px; overflow: auto; margin: 0; padding: 8px; background: rgba(255,255,255,.96); border: 1px solid #333; font: 10px/1.3 monospace; white-space: pre-wrap; }
    html.is-visual-capture #result { display: none; }
  </style>
</head>
<body>
  <iframe id="app" title="Plotypus application under test" data-src="../index.html?v=20260624-i18n-quality"></iframe>
  <pre id="result">{"status":"running"}</pre>
  <script>
    const result = document.querySelector("#result");
    const frame = document.querySelector("#app");
    const frameErrors = [];
    const params = new URLSearchParams(location.search);
    const requestedWorkspace = params.get("workspace") || "";
    const requestedDialog = params.get("dialog") || "";
    const loadSample = params.get("sample") === "1";
    const measurePerformance = params.get("performance") === "1";
    const visualCapture = params.get("visual") === "1";
    const seededCanvasZoom = Number(params.get("canvasZoom"));
    const canvasZoomLevels = [25, 33, 50, 67, 75, 90, 100, 110, 125, 150, 175, 200];
    const initialCanvasZoom = canvasZoomLevels.includes(seededCanvasZoom) ? seededCanvasZoom : 125;
    if (visualCapture) document.documentElement.classList.add("is-visual-capture");
    try {
      localStorage.removeItem("plotypus.propertiesPanel");
      localStorage.removeItem("plotypus.uiLanguage");
      if (canvasZoomLevels.includes(seededCanvasZoom)) {
        localStorage.setItem("plotypus.canvasViewZoom", JSON.stringify(seededCanvasZoom));
      } else {
        localStorage.removeItem("plotypus.canvasViewZoom");
      }
    } catch (_error) {
      // Storage may be unavailable in a locked-down browser profile.
    }
    function waitFor(predicate, timeout = 8000) {
      const started = performance.now();
      return new Promise((resolve, reject) => {
        const poll = () => {
          try {
            const value = predicate();
            if (value) return resolve(value);
          } catch (_error) {
            // The frame may still be navigating.
          }
          if (performance.now() - started > timeout) return reject(new Error("Timed out waiting for application readiness"));
          setTimeout(poll, 50);
        };
        poll();
      });
    }

    function dispatchKey(target, key) {
      const View = target.ownerDocument?.defaultView?.KeyboardEvent || KeyboardEvent;
      target.dispatchEvent(new View("keydown", { key, bubbles: true, cancelable: true }));
    }

    function assert(checks, name, pass, detail = "") {
      checks.push({ name, pass: Boolean(pass), detail });
    }

    function floatingSurfaceState(surface, { boundary = null, hitTarget = null } = {}) {
      if (!surface) return { pass: false, detail: "surface missing" };
      const view = surface.ownerDocument.defaultView;
      const rect = surface.getBoundingClientRect();
      const rawBoundaryRect = boundary?.getBoundingClientRect() || {
        top: 0,
        right: view.innerWidth,
        bottom: view.innerHeight,
        left: 0
      };
      const boundaryRect = {
        top: Math.max(0, rawBoundaryRect.top),
        right: Math.min(view.innerWidth, rawBoundaryRect.right),
        bottom: Math.min(view.innerHeight, rawBoundaryRect.bottom),
        left: Math.max(0, rawBoundaryRect.left)
      };
      const target = hitTarget || surface;
      const targetRect = target.getBoundingClientRect();
      const sampleX = Math.min(Math.max(targetRect.left + targetRect.width / 2, 0), view.innerWidth - 1);
      const sampleY = Math.min(Math.max(targetRect.top + targetRect.height / 2, 0), view.innerHeight - 1);
      const topNode = surface.ownerDocument.elementFromPoint(sampleX, sampleY);
      const style = view.getComputedStyle(surface);
      const hasSize = rect.width > 0 && rect.height > 0;
      const isRendered = style.display !== "none" && style.visibility !== "hidden";
      const isContained = rect.left >= boundaryRect.left - 1
        && rect.right <= boundaryRect.right + 1
        && rect.top >= boundaryRect.top - 1
        && rect.bottom <= boundaryRect.bottom + 1;
      const isTopmost = Boolean(topNode && (target === topNode || target.contains(topNode)));
      return {
        pass: hasSize && isRendered && isContained && isTopmost,
        detail: `surface=${Math.round(rect.left)},${Math.round(rect.top)}-${Math.round(rect.right)},${Math.round(rect.bottom)} boundary=${Math.round(boundaryRect.left)},${Math.round(boundaryRect.top)}-${Math.round(boundaryRect.right)},${Math.round(boundaryRect.bottom)} top=${topNode?.tagName || "none"}#${topNode?.id || ""}.${topNode?.className?.baseVal || topNode?.className || ""}`
      };
    }

    function parseCssRgb(value) {
      const colour = String(value || "").trim();
      const hexMatch = colour.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
      if (hexMatch) {
        const hex = hexMatch[1].length === 3
          ? hexMatch[1].split("").map(channel => channel + channel).join("")
          : hexMatch[1];
        return [0, 2, 4].map(offset => Number.parseInt(hex.slice(offset, offset + 2), 16));
      }
      const match = colour.match(/rgba?\(([^)]+)\)/i);
      if (!match) return null;
      const channels = match[1].split(",").slice(0, 3).map(part => Number.parseFloat(part.trim()));
      return channels.length === 3 && channels.every(Number.isFinite) ? channels : null;
    }

    function cssColoursMatch(first, second) {
      const firstRgb = parseCssRgb(first);
      const secondRgb = parseCssRgb(second);
      return Boolean(firstRgb && secondRgb && firstRgb.every((channel, index) => Math.abs(channel - secondRgb[index]) < 0.5));
    }

    function relativeLuminanceFromCssColor(value) {
      const rgb = parseCssRgb(value);
      if (!rgb) return null;
      const [r, g, b] = rgb.map(channel => {
        const normalized = channel / 255;
        return normalized <= 0.03928 ? normalized / 12.92 : Math.pow((normalized + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function contrastRatioFromCssColors(foreground, background) {
      const fg = relativeLuminanceFromCssColor(foreground);
      const bg = relativeLuminanceFromCssColor(background);
      if (fg === null || bg === null) return 0;
      return (Math.max(fg, bg) + 0.05) / (Math.min(fg, bg) + 0.05);
    }
    const rawUiKeyPattern = /\b(?:action|app|aria|canvas|catalog|csv|dialog|export|fieldOrigin|keyboard|language|loading|map|performance|properties|project|quality|region|settings|status|summary|table|toolbar|translate|workspace)\.[A-Za-z0-9_.-]+/;
    const knownEnglishUiPhrases = [
      /\bNo project points yet\b/i,
      /\bStart a Plotypus map\b/i,
      /\bChoose how to begin\b/i,
      /\bStart new\b/i,
      /\bOpen Plotypus file\b/i,
      /\bLoad the sample\b/i,
      /\bLoad sample\b/i,
      /\bSave project\b/i,
      /\bOpen project\b/i,
      /\bExport CSV\b/i,
      /\bImport CSV\b/i,
      /\bMap details\b/i,
      /\bProject points\b/i,
      /\bCategories & markers\b/i,
      /\bMap baselayer\b/i,
      /\bMap quality\b/i,
      /\bReview and refine before export\b/i,
      /\bRows\b/i,
      /\bMapped\b/i,
      /\bRegions\b/i,
      /\bProperties\b/i,
      /\bNo selection\b/i,
      /\bAdd row\b/i,
      /\bAdd from source\b/i,
      /\bFrom source\b/i,
      /\bMulti select\b/i,
      /\bClear coordinates\b/i,
      /\bClear table\b/i,
      /\bDelete selected\b/i,
      /\bDelete\b/i,
      /\bChoose preset\b/i,
      /\bSelect all\b/i,
      /\bClear regions\b/i,
      /\bUse project regions\b/i,
      /\bReset colours\b/i,
      /\bReset colors\b/i,
      /\bMissing coordinates\b/i,
      /\bNo-coordinate callouts\b/i,
      /\bRender performance\b/i,
      /\bRuntime\b/i,
      /\bNo timings yet\b/i,
      /\bMap style\b/i,
      /\bMap size\b/i,
      /\bCanvas size\b/i,
      /\bPage preset\b/i,
      /\bDefault characters per line\b/i,
      /\bMap display\b/i,
      /\bLegend\b/i,
      /\bCompact boxes\b/i,
      /\bLeader border\b/i,
      /\bElbow leaders\b/i,
      /\bLock markers\b/i,
      /\bDistance guides\b/i,
      /\bDetailed publishing checklist\b/i,
      /\bLoad data to generate the map\b/i,
      /\bMap canvas\b/i,
      /\bDocument page preview\b/i,
      /\bScreen guide only\b/i,
      /\bAuto-place\b/i,
      /\bFit: map \+ labels\b/i,
      /\bFit: labels only\b/i,
      /\bExport readiness\b/i,
      /\bAdd points from a source\b/i,
      /\bCurated presets\b/i,
      /\bCapital cities\b/i,
      /\bMajor cities\b/i,
      /\bSea & inland ports\b/i,
      /\bInternational airports\b/i,
      /\bNational parks\b/i,
      /\bUniversities\b/i,
      /\bGovernment open data\b/i,
      /\bSave map details\b/i,
      /\bMap CSV columns\b/i,
      /\bPlotypus field\b/i,
      /\bYour CSV column\b/i,
      /\bSample value\b/i,
      /\bRequired fields must be mapped\b/i,
      /\bImport mapped rows\b/i,
      /\bKeyboard shortcuts\b/i,
      /\bShortcuts\b/i,
      /\bCancel\b/i,
      /\bClose\b/i
    ];

    function visibleText(root) {
      if (!root) return "";
      const walker = root.ownerDocument.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const chunks = [];
      while (walker.nextNode()) {
        const textNode = walker.currentNode;
        const text = textNode.textContent.trim();
        if (!text) continue;
        let node = textNode.parentElement;
        let visible = true;
        while (node && node !== root.parentElement) {
          const style = node.ownerDocument.defaultView.getComputedStyle(node);
          if (style.display === "none" || style.visibility === "hidden") {
            visible = false;
            break;
          }
          node = node.parentElement;
        }
        if (visible) chunks.push(text);
      }
      return chunks
        .join(" ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function assertNoRawUiKeys(checks, name, root) {
      const text = visibleText(root);
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoRawUiKeysInRoots(checks, name, roots) {
      const text = roots.map(root => visibleText(root)).join(" ");
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoKnownEnglishUi(checks, name, roots, allowedPatterns = []) {
      const text = roots.map(root => visibleText(root)).join(" ");
      const offending = knownEnglishUiPhrases.find(pattern => pattern.test(text) && !allowedPatterns.some(allowed => allowed.test(text)));
      assert(checks, name, !offending, offending ? text : "");
    }

    function uiAttributeText(roots) {
      return roots.flatMap(root => Array.from(root?.querySelectorAll("[aria-label], [title], [placeholder]") || []))
        .filter(node => !node.closest("tbody tr[data-row-id], .translation-row, #mapSvg"))
        .flatMap(node => ["aria-label", "title", "placeholder"].map(attribute => node.getAttribute(attribute) || ""))
        .filter(Boolean)
        .join(" ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function assertNoRawUiKeysInAttributes(checks, name, roots) {
      const text = uiAttributeText(roots);
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoKnownEnglishUiInAttributes(checks, name, roots, allowedPatterns = []) {
      const text = uiAttributeText(roots);
      const offending = knownEnglishUiPhrases.find(pattern => pattern.test(text) && !allowedPatterns.some(allowed => allowed.test(text)));
      assert(checks, name, !offending, offending ? text : "");
    }

    frame.addEventListener("load", async () => {
      const checks = [];
      try {
        const doc = await waitFor(() => {
          const candidate = frame.contentDocument;
          return candidate?.querySelector("#exportMenuBtn") && candidate.querySelector("#previewTableTab") ? candidate : null;
        });
        frame.contentWindow.addEventListener("error", event => {
          frameErrors.push(event.error && event.error.stack || event.message || "Unknown frame error");
        });
        frame.contentWindow.addEventListener("unhandledrejection", event => {
          frameErrors.push(event.reason && event.reason.stack || String(event.reason || "Unknown frame rejection"));
        });
        await waitFor(() => doc.body.dataset.workspaceView === "preview");
        if (doc.fonts?.load) await doc.fonts.load('12px "IBM Plex Mono"');
        if (doc.fonts?.ready) await doc.fonts.ready;
        assert(checks, "Bundled IBM Plex Mono is available offline", !doc.fonts || doc.fonts.check('12px "IBM Plex Mono"'));
        const rootStyle = frame.contentWindow.getComputedStyle(doc.documentElement);
        const brandSurfaces = {
          app: rootStyle.getPropertyValue("--app-background").trim(),
          controls: rootStyle.getPropertyValue("--control-background").trim(),
          content: rootStyle.getPropertyValue("--content-background").trim(),
          properties: rootStyle.getPropertyValue("--properties-background").trim()
        };
        const brandInk = rootStyle.getPropertyValue("--ink").trim();
        const brandAccent = rootStyle.getPropertyValue("--accent").trim();
        assert(checks, "App chrome uses four distinct semantic brand surfaces", Object.values(brandSurfaces).every(Boolean) && new Set(Object.values(brandSurfaces)).size === 4, JSON.stringify(brandSurfaces));
        const brandSurfaceContrasts = Object.entries(brandSurfaces).map(([name, colour]) => [name, contrastRatioFromCssColors(brandInk, colour)]);
        assert(checks, "Brand surfaces preserve readable text contrast", brandSurfaceContrasts.every(([, ratio]) => ratio >= 4.5), brandSurfaceContrasts.map(([name, ratio]) => `${name}=${ratio.toFixed(2)}`).join(", "));
        const primaryButtonContrast = contrastRatioFromCssColors("#ffffff", brandAccent);
        assert(checks, "Primary brand buttons preserve readable contrast", primaryButtonContrast >= 4.5, primaryButtonContrast.toFixed(2));
        const dialogCardSurfaces = [
          ...doc.querySelectorAll(".app-dialog .dialog-card"),
          doc.querySelector(".shortcuts-overlay .shortcuts-card")
        ].filter(Boolean);
        const dialogChromeSurfaces = Array.from(doc.querySelectorAll(".app-dialog .dialog-header, .app-dialog .dialog-footer, .app-dialog .catalog-toolbar"));
        const dialogBodySurfaces = Array.from(doc.querySelectorAll(".app-dialog .dialog-body"));
        const dialogScrimSurfaces = [
          ...doc.querySelectorAll(".app-dialog .dialog-scrim"),
          doc.querySelector(".shortcuts-overlay")
        ].filter(Boolean);
        const contentSurface = brandSurfaces.content;
        const controlSurface = brandSurfaces.controls;
        const dialogScrim = rootStyle.getPropertyValue("--dialog-scrim").trim();
        assert(checks, "Every modal uses the branded content surface", dialogCardSurfaces.length === 6 && dialogCardSurfaces.every(node => cssColoursMatch(frame.contentWindow.getComputedStyle(node).backgroundColor, contentSurface)), dialogCardSurfaces.map(node => frame.contentWindow.getComputedStyle(node).backgroundColor).join(", "));
        assert(checks, "Dialog headers, toolbars, and footers use the branded control surface", dialogChromeSurfaces.length >= 10 && dialogChromeSurfaces.every(node => cssColoursMatch(frame.contentWindow.getComputedStyle(node).backgroundColor, controlSurface)), dialogChromeSurfaces.map(node => frame.contentWindow.getComputedStyle(node).backgroundColor).join(", "));
        assert(checks, "Dialog bodies use the branded content surface", dialogBodySurfaces.length === 5 && dialogBodySurfaces.every(node => cssColoursMatch(frame.contentWindow.getComputedStyle(node).backgroundColor, contentSurface)), dialogBodySurfaces.map(node => frame.contentWindow.getComputedStyle(node).backgroundColor).join(", "));
        assert(checks, "Every modal uses the shared branded scrim", dialogScrimSurfaces.length === 6 && dialogScrimSurfaces.every(node => cssColoursMatch(frame.contentWindow.getComputedStyle(node).backgroundColor, dialogScrim)), dialogScrimSurfaces.map(node => frame.contentWindow.getComputedStyle(node).backgroundColor).join(", "));
        const workspaceIntros = Array.from(doc.querySelectorAll(".workspace-intro"));
        const workspaceIntroSignatures = workspaceIntros.map(intro => {
          const introStyle = frame.contentWindow.getComputedStyle(intro);
          const copyStyle = frame.contentWindow.getComputedStyle(intro.querySelector(".workspace-intro-copy"));
          const headingStyle = frame.contentWindow.getComputedStyle(intro.querySelector("h2"));
          return [
            introStyle.paddingTop,
            introStyle.paddingRight,
            introStyle.paddingBottom,
            introStyle.paddingLeft,
            introStyle.columnGap,
            copyStyle.rowGap,
            headingStyle.marginTop,
            headingStyle.marginBottom
          ].join("|");
        });
        assert(checks, "All six workspaces use the shared intro template", workspaceIntros.length === 6 && workspaceIntros.every(intro => intro.tagName === "HEADER" && intro.firstElementChild?.classList.contains("workspace-intro-copy")));
        assert(checks, "All workspace intros use identical spacing", new Set(workspaceIntroSignatures).size === 1, workspaceIntroSignatures.join(", "));
        const startupDialog = await waitFor(() => {
          const dialog = doc.querySelector("#startupDialog");
          return dialog && dialog.hidden === false ? dialog : null;
        }, 4000);
        const startupActions = Array.from(startupDialog.querySelectorAll("[data-startup-action]")).map(button => button.dataset.startupAction);
        assert(checks, "Startup dialog opens for an empty app", startupDialog.getAttribute("role") === "dialog" && startupDialog.getAttribute("aria-modal") === "true" && startupDialog.getAttribute("aria-labelledby") === "startupTitle");
        const startupSurfaceState = floatingSurfaceState(startupDialog.querySelector(".dialog-card"));
        assert(checks, "Startup dialog is fully visible and unobscured", startupSurfaceState.pass, startupSurfaceState.detail);
        assert(checks, "Startup dialog offers new, open, sample, and CSV choices", ["new", "open", "sample", "csv"].every(action => startupActions.includes(action)), startupActions.join(", "));
        assert(checks, "Startup dialog starts on Start new", doc.activeElement === doc.querySelector("#startupStartNewBtn"));
        const startupPrimaryOption = doc.querySelector("#startupStartNewBtn");
        const startupPrimaryStyle = frame.contentWindow.getComputedStyle(startupPrimaryOption);
        const startupPrimaryTitleStyle = frame.contentWindow.getComputedStyle(startupPrimaryOption.querySelector("strong"));
        const startupPrimaryBodyStyle = frame.contentWindow.getComputedStyle(startupPrimaryOption.querySelector("span"));
        const startupPrimaryIconStyle = frame.contentWindow.getComputedStyle(startupPrimaryOption.querySelector("svg"));
        const startupPrimaryBg = startupPrimaryStyle.backgroundColor;
        const startupPrimaryTitleRatio = contrastRatioFromCssColors(startupPrimaryTitleStyle.color, startupPrimaryBg);
        const startupPrimaryBodyRatio = contrastRatioFromCssColors(startupPrimaryBodyStyle.color, startupPrimaryBg);
        const startupPrimaryIconRatio = contrastRatioFromCssColors(startupPrimaryIconStyle.color, startupPrimaryBg);
        assert(checks, "Startup primary option meets contrast requirements", startupPrimaryTitleRatio >= 4.5 && startupPrimaryBodyRatio >= 4.5 && startupPrimaryIconRatio >= 3, `title=${startupPrimaryTitleRatio.toFixed(2)}, body=${startupPrimaryBodyRatio.toFixed(2)}, icon=${startupPrimaryIconRatio.toFixed(2)}, bg=${startupPrimaryBg}`);

        if (requestedDialog === "startup") {
          doc.querySelector("[data-ui-language='fr']")?.click();
          await waitFor(() => doc.documentElement.lang === "fr" && /Créer une carte Plotypus/.test(doc.querySelector("#startupTitle")?.textContent || ""), 2000);
          assert(checks, "Top language toggle switches Startup dialog copy to French", /Nouveau projet/.test(startupDialog.textContent || "") && /Ouvrir un fichier Plotypus/.test(startupDialog.textContent || "") && /Charger l'exemple/.test(startupDialog.textContent || "") && /Importer un CSV/.test(startupDialog.textContent || ""), startupDialog.textContent || "");
          assertNoRawUiKeys(checks, "Startup dialog does not show raw translation keys in French", startupDialog);
          assertNoKnownEnglishUi(checks, "Startup dialog does not show known English UI phrases in French", [startupDialog]);
          assertNoRawUiKeysInAttributes(checks, "Startup dialog attributes do not show raw translation keys in French", [startupDialog]);
          assertNoKnownEnglishUiInAttributes(checks, "Startup dialog attributes do not show known English UI phrases in French", [startupDialog]);
          doc.querySelector("[data-ui-language='en']")?.click();
          await waitFor(() => doc.documentElement.lang === "en" && /Start a Plotypus map/.test(doc.querySelector("#startupTitle")?.textContent || ""), 2000);
          doc.querySelector("#startupStartNewBtn")?.click();
          await waitFor(() => startupDialog.hidden === true && doc.body.dataset.workspaceView === "projects", 2000);
          assert(checks, "Startup Start new closes dialog and opens Project points", startupDialog.hidden === true && doc.body.dataset.workspaceView === "projects");
          assert(checks, "Empty Project points prioritizes Add data", doc.querySelector("#projectFilterControl")?.hidden === true && doc.querySelector("#projectSelectionActions")?.hidden === true && doc.querySelector("#clearRowsBtn")?.disabled === true && Boolean(doc.querySelector("#projectAddMenuBtn")));
          const failed = checks.filter(check => !check.pass);
          result.textContent = JSON.stringify({
            status: failed.length ? "failed" : "ok",
            dialog: requestedDialog,
            viewport: { width: innerWidth, height: innerHeight },
            checks,
            failures: failed.length,
            frameErrors
          }, null, 2);
          return;
        }

        if (!loadSample) {
          doc.querySelector("#startupStartNewBtn")?.click();
          await waitFor(() => startupDialog.hidden === true, 2000);
        }

        if (loadSample) {
          const samplesBeforeLoad = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot().samples.length || 0;
          const sampleButton = startupDialog.hidden === false ? doc.querySelector("#startupLoadSampleBtn") : doc.querySelector("#ribbonLoadSampleBtn");
          sampleButton.click();
          assert(checks, "Loading animation appears during sample render", doc.querySelector("#mapHost")?.classList.contains("is-rendering"));
          await waitFor(() => startupDialog.hidden === true, 2000);
          await waitFor(() => doc.querySelectorAll("#projectTable tbody tr").length > 0, 12000);
          const sampleLoadSnapshot = await waitFor(() => {
            const snapshot = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot();
            return snapshot?.samples.length > samplesBeforeLoad && snapshot;
          }, 12000);
          if (measurePerformance) {
            const samplesBeforeAutoPlace = sampleLoadSnapshot.samples.length;
            doc.querySelector("#canvasAutoPlaceBtn").click();
            try {
              await waitFor(() => {
                const snapshot = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot();
                return snapshot?.samples.length > samplesBeforeAutoPlace && snapshot.latestByKind.autoPlace;
              }, 60000);
            } catch (_error) {
              throw new Error("Auto-place did not complete or record a performance timing within 60 seconds");
            }
          }
        }
        const performanceApi = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE;
        const performanceSnapshot = performanceApi?.snapshot();
        assert(checks, "Render performance telemetry is available", Boolean(performanceSnapshot?.samples.length && performanceApi?.budgets?.renderMs));
        if (loadSample) {
          const latestRender = performanceSnapshot.latestByKind.render;
          assert(checks, "Sample render uses the configured render budget", latestRender.budgetMs === performanceApi.budgets.renderMs && latestRender.overBudget === (latestRender.totalMs > latestRender.budgetMs), `${latestRender.totalMs} / ${latestRender.budgetMs} ms`);
        }
        if (measurePerformance) {
          const latestAutoPlace = performanceSnapshot.latestByKind.autoPlace;
          assert(checks, "Sample auto-place uses the configured auto-place budget", latestAutoPlace.budgetMs === performanceApi.budgets.autoPlaceMs && latestAutoPlace.overBudget === (latestAutoPlace.totalMs > latestAutoPlace.budgetMs), `${latestAutoPlace.totalMs} / ${latestAutoPlace.budgetMs} ms`);
          assert(checks, "Scheduled render telemetry includes queue time", performanceSnapshot.latestByKind.autoPlace.source === "scheduled" && performanceSnapshot.latestByKind.autoPlace.queueMs >= 0, `${performanceSnapshot.latestByKind.autoPlace.source}, ${performanceSnapshot.latestByKind.autoPlace.queueMs} ms`);
        }
        const canvasZoomReadout = doc.querySelector("#canvasZoomReadout");
        if (canvasZoomReadout) {
          const readoutText = canvasZoomReadout.textContent.trim();
          const mapScaleBeforeCanvasZoom = doc.querySelector("#mapScaleInput")?.value;
          const canvasWidthBeforeZoom = parseFloat(doc.querySelector("#mapSvg")?.style.width || "0");
          const documentPageWidthBeforeZoom = parseFloat(frame.contentWindow.getComputedStyle(doc.querySelector("#documentPagePreview")).width || "0");
          const zoomAfterIncrease = canvasZoomLevels.find(level => level > initialCanvasZoom);
          assert(checks, seededCanvasZoom ? "Canvas zoom restores the saved browser preference on load" : "Canvas zoom defaults to 125%", readoutText === `Canvas ${initialCanvasZoom}%`, readoutText);
          doc.querySelector("#canvasZoomInBtn")?.click();
          const canvasWidthAfterZoom = parseFloat(doc.querySelector("#mapSvg")?.style.width || "0");
          const documentPageWidthAfterZoom = parseFloat(frame.contentWindow.getComputedStyle(doc.querySelector("#documentPagePreview")).width || "0");

            const initialOverlapValue = getOverlapCardValue();
            doc.querySelector("#previewTableTab")?.click();
            await waitFor(() => doc.body.dataset.workspaceView === "preview" && !doc.querySelector("#canvasQualityPill")?.hidden, 4000);
            const movableLabels = Array.from(doc.querySelectorAll("#mapSvg .map-label")).filter(node => node.__data__);
            const initialGeometry = overlapCountFromLabels(movableLabels);
            const isolatedIndex = initialGeometry.rects.findIndex((rect, index) => initialGeometry.rects.every((other, otherIndex) => (
              index === otherIndex || !frame.contentWindow.PLOTYPUS_GEOMETRY.rectsOverlap(rect, other)
            )));
            const targetIndex = movableLabels.findIndex((_, index) => index !== isolatedIndex);
            assert(checks, "Quality refresh regression has movable non-overlapping labels", movableLabels.length >= 2 && isolatedIndex >= 0 && targetIndex >= 0);
            if (isolatedIndex >= 0 && targetIndex >= 0) {
              const svgNode = doc.querySelector("#mapSvg");
              const toScreenPoint = rect => {
                const point = svgNode.createSVGPoint();
                point.x = rect.centerX;
                point.y = rect.centerY;
                return point.matrixTransform(svgNode.getScreenCTM());
              };
              const sourcePoint = toScreenPoint(initialGeometry.rects[isolatedIndex]);
              const targetPoint = toScreenPoint(initialGeometry.rects[targetIndex]);
              const sourceLabel = movableLabels[isolatedIndex];
              const qualityAnalysisBefore = frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot();
              sourceLabel.dispatchEvent(new frame.contentWindow.MouseEvent("mousedown", {
                bubbles: true,
                cancelable: true,
                button: 0,
                buttons: 1,
                clientX: sourcePoint.x,
                clientY: sourcePoint.y,
                view: frame.contentWindow
              }));
              frame.contentWindow.dispatchEvent(new frame.contentWindow.MouseEvent("mousemove", {
                bubbles: true,
                cancelable: true,
                buttons: 1,
                clientX: targetPoint.x,
                clientY: targetPoint.y,
                view: frame.contentWindow
              }));
              frame.contentWindow.dispatchEvent(new frame.contentWindow.MouseEvent("mouseup", {
                bubbles: true,
                cancelable: true,
                button: 0,
                clientX: targetPoint.x,
                clientY: targetPoint.y,
                view: frame.contentWindow
              }));
              const movedOverlapValue = overlapCountFromLabels(movableLabels).overlaps;
              const mapBeforeQualityRefresh = doc.querySelector("#mapSvg")?.innerHTML || "";
              const renderSamplesBeforeQualityRefresh = performanceApi?.snapshot().samples.length || 0;
              // D3 suppresses the click in the same task as drag-end; a real tab click arrives in the next task.
              await new Promise(resolve => setTimeout(resolve, 0));
              const qualityOpenStartedAt = performance.now();
              doc.querySelector("#qualityTableTab")?.click();
              const qualityOpenDuration = performance.now() - qualityOpenStartedAt;
              const qualityAnalysisAtOpen = frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot();
              const qualityFinishedBeforeOpen = Boolean(
                qualityAnalysisBefore
                && qualityAnalysisAtOpen
                && qualityAnalysisAtOpen.pending === false
                && qualityAnalysisAtOpen.completed > qualityAnalysisBefore.completed
              );
              assert(
                checks,
                "Opening Map quality remains responsive while analysis is pending or already complete",
                qualityOpenDuration < 120
                  && doc.body.dataset.workspaceView === "quality"
                  && (doc.querySelector("#qualityTablePane")?.getAttribute("aria-busy") === "true" || qualityFinishedBeforeOpen),
                JSON.stringify({
                  durationMs: Number(qualityOpenDuration.toFixed(1)),
                  workspace: doc.body.dataset.workspaceView,
                  ariaBusy: doc.querySelector("#qualityTablePane")?.getAttribute("aria-busy"),
                  analysis: qualityAnalysisAtOpen
                })
              );
              await waitFor(() => (
                doc.body.dataset.workspaceView === "quality"
                && getOverlapCardValue() === movedOverlapValue
                && Number(doc.querySelector("#canvasQualityPill .canvas-quality-metric strong")?.textContent || NaN) === movedOverlapValue
                && frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot().pending === false
              ), 4000);
              const qualityAnalysisAfter = frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot();
              const overlapChecklist = Array.from(doc.querySelectorAll("#statusBox .checklist-item"))
                .find(node => /Label overlaps|Chevauchements d'étiquettes/i.test(node.querySelector("strong")?.textContent || ""));
              const qualityVerdict = doc.querySelector("#propertiesSelectionControls .quality-properties-verdict")?.textContent || "";
              const qualityRequestDelta = qualityAnalysisAfter.requests - qualityAnalysisBefore.requests;
              const qualityStartedDelta = qualityAnalysisAfter.started - qualityAnalysisBefore.started;
              const qualityCompletedDelta = qualityAnalysisAfter.completed - qualityAnalysisBefore.completed;
              const qualityCoalescedDelta = qualityAnalysisAfter.coalesced - qualityAnalysisBefore.coalesced;
              const overlappedRequests = qualityRequestDelta === 2 && qualityCoalescedDelta >= 1;
              const reusedCompletedRequest = qualityRequestDelta === 1 && qualityFinishedBeforeOpen;
              assert(checks, "Moving a label refreshes the map quality pill in the background", movedOverlapValue > initialGeometry.overlaps && movedOverlapValue > initialOverlapValue, `${initialOverlapValue} -> ${movedOverlapValue}`);
              assert(checks, "Opening Map quality recomputes moved-label metrics", getOverlapCardValue() === movedOverlapValue && overlapChecklist?.textContent.includes(String(movedOverlapValue)) && qualityVerdict.includes(String(movedOverlapValue)), `${getOverlapCardValue()} / ${overlapChecklist?.textContent || ""} / ${qualityVerdict}`);
              assert(checks, "Map quality coalesces overlapping requests or reuses a completed background analysis", Boolean(qualityAnalysisBefore && qualityAnalysisAfter) && qualityStartedDelta === 1 && qualityCompletedDelta === 1 && (overlappedRequests || reusedCompletedRequest), JSON.stringify({ before: qualityAnalysisBefore, atOpen: qualityAnalysisAtOpen, after: qualityAnalysisAfter }));
              assert(checks, "Quality refresh does not re-plot the map", (doc.querySelector("#mapSvg")?.innerHTML || "") === mapBeforeQualityRefresh);
              assert(checks, "Quality refresh records no render timing", (performanceApi?.snapshot().samples.length || 0) === renderSamplesBeforeQualityRefresh);
              doc.querySelector("#previewTableTab")?.click();
              await waitFor(() => doc.body.dataset.workspaceView === "preview", 2000);

              const currentSourcePoint = toScreenPoint(overlapCountFromLabels(movableLabels).rects[isolatedIndex]);
              const previewAnalysisBefore = frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot();
              sourceLabel.dispatchEvent(new frame.contentWindow.MouseEvent("mousedown", {
                bubbles: true,
                cancelable: true,
                button: 0,
                buttons: 1,
                clientX: currentSourcePoint.x,
                clientY: currentSourcePoint.y,
                view: frame.contentWindow
              }));
              frame.contentWindow.dispatchEvent(new frame.contentWindow.MouseEvent("mousemove", {
                bubbles: true,
                cancelable: true,
                buttons: 1,
                clientX: sourcePoint.x,
                clientY: sourcePoint.y,
                view: frame.contentWindow
              }));
              frame.contentWindow.dispatchEvent(new frame.contentWindow.MouseEvent("mouseup", {
                bubbles: true,
                cancelable: true,
                button: 0,
                clientX: sourcePoint.x,
                clientY: sourcePoint.y,
                view: frame.contentWindow
              }));
              const previewCompletedOverlapValue = overlapCountFromLabels(movableLabels).overlaps;
              assert(checks, "A second label move starts quality analysis while Preview remains active", frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot().pending === true);
              await waitFor(() => (
                doc.body.dataset.workspaceView === "preview"
                && frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot().pending === false
                && frame.contentWindow.PLOTYPUS_QUALITY_ANALYSIS?.snapshot().completed > previewAnalysisBefore.completed
              ), 4000);
              doc.querySelector("#qualityTableTab")?.click();
              await waitFor(() => doc.body.dataset.workspaceView === "quality" && doc.querySelector("#qualityTablePane")?.getAttribute("aria-busy") === "false", 2000);
              const previewCompletedChecklist = Array.from(doc.querySelectorAll("#statusBox .checklist-item"))
                .find(node => /Label overlaps|Chevauchements d'étiquettes/i.test(node.querySelector("strong")?.textContent || ""));
              assert(checks, "Map quality publishes a background result completed before the tab opens", getOverlapCardValue() === previewCompletedOverlapValue && previewCompletedChecklist?.textContent.includes(String(previewCompletedOverlapValue)), `${getOverlapCardValue()} / ${previewCompletedChecklist?.textContent || ""}`);
              doc.querySelector("#previewTableTab")?.click();
              await waitFor(() => doc.body.dataset.workspaceView === "preview", 2000);
            }
            const locateNextAction = doc.querySelector("#canvasQualityPill [data-property-action='open-map']");
            const locateNextRect = locateNextAction?.getBoundingClientRect();
            assert(checks, "Quality Locate next action is available on the visible map pill", Boolean(locateNextAction && locateNextRect && locateNextRect.width > 0 && locateNextRect.height > 0));
            const clickVisibleLocateNext = () => {
              const action = doc.querySelector("#canvasQualityPill [data-property-action='open-map']");
              action?.dispatchEvent(new frame.contentWindow.MouseEvent("click", { bubbles: true, cancelable: true, view: frame.contentWindow }));
            };
            const getLocatedLabelId = () => doc.querySelector("#mapSvg .map-label.is-quality-located")?.dataset.layoutId || "";
            const getLocatedStatus = () => doc.querySelector("#statusBox")?.textContent || "";
            clickVisibleLocateNext();
            await waitFor(() => doc.body.dataset.workspaceView === "preview" && getLocatedLabelId() && /Located quality item 1 of \d+/.test(getLocatedStatus()), 4000);
            const firstLocatedLabelId = getLocatedLabelId();
            const locateTotalMatch = getLocatedStatus().match(/Located quality item 1 of (\d+)/);
            const locateTotal = locateTotalMatch ? Number(locateTotalMatch[1]) : 0;
            assert(checks, "Quality Locate next selects and highlights a map label from the visible map pill", doc.body.dataset.workspaceView === "preview" && Boolean(firstLocatedLabelId) && locateTotal > 0 && /Extra info|Infos supplémentaires/.test(doc.querySelector("#propertiesTitle")?.textContent || ""), doc.querySelector("#propertiesTitle")?.textContent || "");
            for (let locateIndex = 2; locateIndex <= locateTotal; locateIndex += 1) {
              clickVisibleLocateNext();
              await waitFor(() => new RegExp(`Located quality item ${locateIndex} of ${locateTotal}`).test(getLocatedStatus()), 4000);
            }
            clickVisibleLocateNext();
            await waitFor(() => /Located quality item 1 of \d+/.test(getLocatedStatus()) && getLocatedLabelId() === firstLocatedLabelId, 4000);
            assert(checks, "Quality Locate next repeats after the final review label", getLocatedLabelId() === firstLocatedLabelId, getLocatedStatus());
            doc.querySelector("#qualityTableTab")?.click();
            await waitFor(() => doc.body.dataset.workspaceView === "quality", 2000);
            const detailsAction = doc.querySelector("#qualityMetricsPanel [data-property-action='open-map-details']");
            detailsAction?.click();
            await waitFor(() => doc.querySelector("#mapDetailsDialog")?.hidden === false, 2000);
            assert(checks, "Quality remediation opens Map details", Boolean(detailsAction) && doc.querySelector("#mapDetailsDialog")?.hidden === false);
            doc.querySelector("#mapDetailsDialog [data-dialog-close='map-details']")?.click();
            assert(checks, "Quality remediation dialog closes cleanly", doc.querySelector("#mapDetailsDialog")?.hidden === true);
          }
          if (visualCapture) {
            doc.querySelector(target[0])?.click();
            if (requestedWorkspace === "categories") doc.querySelector("#categoryList .category-editor")?.click();
            doc.querySelectorAll("#projectTable tr.is-active-row").forEach(row => row.classList.remove("is-active-row"));
            doc.querySelectorAll("#regionTable tr.is-active-region").forEach(row => {
              row.classList.remove("is-active-region");
              row.removeAttribute("aria-current");
            });
            doc.activeElement?.blur();
            await waitFor(() => !doc.querySelector("#mapHost")?.classList.contains("is-rendering"), 12000);
            await new Promise(resolve => setTimeout(resolve, 0));
          }
          const failed = checks.filter(check => !check.pass);
          result.textContent = JSON.stringify({
            status: failed.length ? "failed" : "ok",
            workspace: requestedWorkspace,
            viewport: { width: innerWidth, height: innerHeight },
            checks,
            failures: failed.length,
            frameErrors
          }, null, 2);
          return;
        }

        const exportButton = doc.querySelector("#exportMenuBtn");
        const exportMenu = doc.querySelector("#exportMenu");
        const pngButton = doc.querySelector("#ribbonExportPngBtn");
        const svgButton = doc.querySelector("#ribbonExportSvgBtn");
        const projectTab = doc.querySelector("#projectTableTab");
        const mapTab = doc.querySelector("#previewTableTab");

        assert(checks, "Map workspace is the default", mapTab.classList.contains("is-active") && doc.body.dataset.workspaceView === "preview");
        assert(checks, "Export menu starts closed", exportMenu.hidden && exportButton.getAttribute("aria-expanded") === "false");

        exportButton.click();
        assert(checks, "Export click opens menu", !exportMenu.hidden && exportButton.getAttribute("aria-expanded") === "true");
        assert(checks, "PNG and SVG commands retain stable IDs", pngButton?.getAttribute("role") === "menuitem" && svgButton?.getAttribute("role") === "menuitem");

        dispatchKey(exportButton, "Escape");
        assert(checks, "Escape closes export menu", exportMenu.hidden && exportButton.getAttribute("aria-expanded") === "false");
        assert(checks, "Escape restores trigger focus", doc.activeElement === exportButton);

        dispatchKey(exportButton, "ArrowDown");
        assert(checks, "Arrow Down opens and focuses first command", !exportMenu.hidden && doc.activeElement === pngButton);
        dispatchKey(pngButton, "ArrowDown");
        assert(checks, "Arrow keys move through export commands", doc.activeElement === svgButton);
        dispatchKey(svgButton, "Escape");

        projectTab.click();
        assert(checks, "Workspace navigation activates Project points", projectTab.classList.contains("is-active") && doc.body.dataset.workspaceView === "projects");
        mapTab.click();
        assert(checks, "Workspace navigation returns to Map", mapTab.classList.contains("is-active") && doc.body.dataset.workspaceView === "preview");

        exportButton.click();
        assert(checks, "Export menu is left open for screenshot review", !exportMenu.hidden);
        const failed = checks.filter(check => !check.pass);
        result.textContent = JSON.stringify({
          status: failed.length ? "failed" : "ok",
          viewport: { width: innerWidth, height: innerHeight },
          checks,
          failures: failed.length
        }, null, 2);
      } catch (error) {
        result.textContent = JSON.stringify({ status: "error", message: error.message, checks, frameErrors }, null, 2);
      }
    });
    frame.src = frame.dataset.src;
  </script>
</body>
</html>
