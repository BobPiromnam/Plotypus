<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plotypus shell interaction smoke</title>
  <style>
    html, body { height: 100%; margin: 0; font: 14px system-ui, sans-serif; }
    #app { display: block; width: 100%; height: 100%; border: 0; }
    #result { position: fixed; left: 8px; bottom: 8px; z-index: 10; width: 320px; max-height: 112px; overflow: auto; margin: 0; padding: 8px; background: rgba(255,255,255,.96); border: 1px solid #333; font: 10px/1.3 monospace; white-space: pre-wrap; }
    html.is-visual-capture #result { display: none; }
  </style>
</head>
<body>
  <iframe id="app" title="Plotypus application under test" data-src="../index.html?v=20260624-i18n-quality"></iframe>
  <pre id="result">{"status":"running"}</pre>
  <script>
    const result = document.querySelector("#result");
    const frame = document.querySelector("#app");
    const frameErrors = [];
    const params = new URLSearchParams(location.search);
    const requestedWorkspace = params.get("workspace") || "";
    const requestedDialog = params.get("dialog") || "";
    const loadSample = params.get("sample") === "1";
    const measurePerformance = params.get("performance") === "1";
    const visualCapture = params.get("visual") === "1";
    const reactCommandBar = params.get("reactCommandBar") === "1";
    const reactMapDetails = params.get("reactMapDetails") === "1";
    const reactProjectToolbar = params.get("reactProjectToolbar") === "1";
    const reactPropertiesPanel = params.get("reactPropertiesPanel") === "1";
    const reactWorkspaceShell = params.get("reactWorkspaceShell") === "1";
    const reactCommands = params.get("reactCommands") === "1";
    if (visualCapture) document.documentElement.classList.add("is-visual-capture");
    try {
      localStorage.removeItem("plotypus.propertiesPanel");
      localStorage.removeItem("plotypus.uiLanguage");
    } catch (_error) {
      // Storage may be unavailable in a locked-down browser profile.
    }
    const appUrl = new URL(frame.dataset.src, window.location.href);
    if (reactCommandBar) appUrl.searchParams.set("reactCommandBar", "1");
    if (reactMapDetails) appUrl.searchParams.set("reactMapDetails", "1");
    if (reactProjectToolbar) appUrl.searchParams.set("reactProjectToolbar", "1");
    if (reactPropertiesPanel) appUrl.searchParams.set("reactPropertiesPanel", "1");
    if (reactWorkspaceShell) appUrl.searchParams.set("reactWorkspaceShell", "1");
    if (reactCommands) appUrl.searchParams.set("reactCommands", "1");
    frame.src = appUrl.toString();

    function waitFor(predicate, timeout = 8000) {
      const started = performance.now();
      return new Promise((resolve, reject) => {
        const poll = () => {
          try {
            const value = predicate();
            if (value) return resolve(value);
          } catch (_error) {
            // The frame may still be navigating.
          }
          if (performance.now() - started > timeout) return reject(new Error("Timed out waiting for application readiness"));
          setTimeout(poll, 50);
        };
        poll();
      });
    }

    function dispatchKey(target, key) {
      const View = target.ownerDocument?.defaultView?.KeyboardEvent || KeyboardEvent;
      target.dispatchEvent(new View("keydown", { key, bubbles: true, cancelable: true }));
    }

    function setFieldValue(field, value) {
      const View = field.ownerDocument?.defaultView || window;
      const doc = field.ownerDocument;
      field.focus();
      if (typeof field.select === "function") field.select();
      if (!(value && typeof doc.execCommand === "function" && doc.execCommand("insertText", false, value) && field.value === value)) {
        const prototype = field.tagName === "TEXTAREA" ? View.HTMLTextAreaElement.prototype : View.HTMLInputElement.prototype;
        const descriptor = Object.getOwnPropertyDescriptor(prototype, "value");
        const previousValue = field.value;
        if (descriptor?.set) descriptor.set.call(field, value);
        else field.value = value;
        if (field._valueTracker && typeof field._valueTracker.setValue === "function") {
          field._valueTracker.setValue(previousValue);
        }
      }
      const InputEventCtor = View.InputEvent || View.Event;
      field.dispatchEvent(new InputEventCtor("input", { bubbles: true, cancelable: true, inputType: "insertText", data: value }));
      field.dispatchEvent(new View.Event("change", { bubbles: true, cancelable: true }));
    }

    function assert(checks, name, pass, detail = "") {
      checks.push({ name, pass: Boolean(pass), detail });
    }

    const rawUiKeyPattern = /\b(?:app|aria|catalog|csv|dialog|export|map|properties|project|quality|region|settings|status|table|toolbar|translate|workspace)\.[A-Za-z0-9_.-]+/;
    const knownEnglishUiPhrases = [
      /\bNo project points yet\b/i,
      /\bLoad the sample\b/i,
      /\bLoad sample\b/i,
      /\bSave project\b/i,
      /\bOpen project\b/i,
      /\bExport CSV\b/i,
      /\bImport CSV\b/i,
      /\bMap details\b/i,
      /\bProject points\b/i,
      /\bCategories & markers\b/i,
      /\bMap baselayer\b/i,
      /\bMap quality\b/i,
      /\bReview and refine before export\b/i,
      /\bRows\b/i,
      /\bMapped\b/i,
      /\bRegions\b/i,
      /\bProperties\b/i,
      /\bNo selection\b/i,
      /\bAdd row\b/i,
      /\bAdd from source\b/i,
      /\bFrom source\b/i,
      /\bMulti select\b/i,
      /\bClear coordinates\b/i,
      /\bClear table\b/i,
      /\bDelete selected\b/i,
      /\bDelete\b/i,
      /\bOpen data\b/i,
      /\bChoose preset\b/i,
      /\bSelect all\b/i,
      /\bClear regions\b/i,
      /\bUse project regions\b/i,
      /\bReset colours\b/i,
      /\bReset colors\b/i,
      /\bMissing coordinates\b/i,
      /\bNo-coordinate callouts\b/i,
      /\bRender performance\b/i,
      /\bRuntime\b/i,
      /\bNo timings yet\b/i,
      /\bMap style\b/i,
      /\bMap size\b/i,
      /\bCanvas size\b/i,
      /\bPage preset\b/i,
      /\bDefault characters per line\b/i,
      /\bMap display\b/i,
      /\bLegend\b/i,
      /\bCompact boxes\b/i,
      /\bLeader border\b/i,
      /\bElbow leaders\b/i,
      /\bLock markers\b/i,
      /\bDistance guides\b/i,
      /\bDetailed publishing checklist\b/i,
      /\bLoad data to generate the map\b/i,
      /\bMap canvas\b/i,
      /\bAuto-place\b/i,
      /\bFit map \+ labels\b/i,
      /\bLabels only\b/i,
      /\bExport readiness\b/i,
      /\bAdd points from a source\b/i,
      /\bCurated presets\b/i,
      /\bCapital cities\b/i,
      /\bMajor cities\b/i,
      /\bSea & inland ports\b/i,
      /\bInternational airports\b/i,
      /\bNational parks\b/i,
      /\bUniversities\b/i,
      /\bGovernment open data\b/i,
      /\bSave map details\b/i,
      /\bMap CSV columns\b/i,
      /\bPlotypus field\b/i,
      /\bYour CSV column\b/i,
      /\bSample value\b/i,
      /\bRequired fields must be mapped\b/i,
      /\bImport mapped rows\b/i,
      /\bKeyboard shortcuts\b/i,
      /\bShortcuts\b/i,
      /\bCancel\b/i,
      /\bClose\b/i
    ];

    function visibleText(root) {
      if (!root) return "";
      const walker = root.ownerDocument.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const chunks = [];
      while (walker.nextNode()) {
        const textNode = walker.currentNode;
        const text = textNode.textContent.trim();
        if (!text) continue;
        let node = textNode.parentElement;
        let visible = true;
        while (node && node !== root.parentElement) {
          const style = node.ownerDocument.defaultView.getComputedStyle(node);
          if (style.display === "none" || style.visibility === "hidden") {
            visible = false;
            break;
          }
          node = node.parentElement;
        }
        if (visible) chunks.push(text);
      }
      return chunks
        .join(" ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function assertNoRawUiKeys(checks, name, root) {
      const text = visibleText(root);
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoRawUiKeysInRoots(checks, name, roots) {
      const text = roots.map(root => visibleText(root)).join(" ");
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoKnownEnglishUi(checks, name, roots, allowedPatterns = []) {
      const text = roots.map(root => visibleText(root)).join(" ");
      const offending = knownEnglishUiPhrases.find(pattern => pattern.test(text) && !allowedPatterns.some(allowed => allowed.test(text)));
      assert(checks, name, !offending, offending ? text : "");
    }

    function uiAttributeText(roots) {
      return roots.flatMap(root => Array.from(root?.querySelectorAll("[aria-label], [title], [placeholder]") || []))
        .filter(node => !node.closest("tbody tr[data-row-id], .translation-row, #mapSvg"))
        .flatMap(node => ["aria-label", "title", "placeholder"].map(attribute => node.getAttribute(attribute) || ""))
        .filter(Boolean)
        .join(" ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function assertNoRawUiKeysInAttributes(checks, name, roots) {
      const text = uiAttributeText(roots);
      assert(checks, name, !rawUiKeyPattern.test(text), text);
    }

    function assertNoKnownEnglishUiInAttributes(checks, name, roots, allowedPatterns = []) {
      const text = uiAttributeText(roots);
      const offending = knownEnglishUiPhrases.find(pattern => pattern.test(text) && !allowedPatterns.some(allowed => allowed.test(text)));
      assert(checks, name, !offending, offending ? text : "");
    }

    frame.addEventListener("load", async () => {
      const checks = [];
      try {
        const doc = await waitFor(() => {
          const candidate = frame.contentDocument;
          return candidate?.querySelector("#exportMenuBtn") && candidate.querySelector("#previewTableTab") ? candidate : null;
        });
        frame.contentWindow.addEventListener("error", event => {
          frameErrors.push(event.error && event.error.stack || event.message || "Unknown frame error");
        });
        frame.contentWindow.addEventListener("unhandledrejection", event => {
          frameErrors.push(event.reason && event.reason.stack || String(event.reason || "Unknown frame rejection"));
        });
        await waitFor(() => doc.body.dataset.workspaceView === "preview");
        if (doc.fonts?.load) await doc.fonts.load('12px "IBM Plex Mono"');
        if (doc.fonts?.ready) await doc.fonts.ready;
        assert(checks, "Bundled IBM Plex Mono is available offline", !doc.fonts || doc.fonts.check('12px "IBM Plex Mono"'));

        if (loadSample) {
          const samplesBeforeLoad = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot().samples.length || 0;
          doc.querySelector("#ribbonLoadSampleBtn").click();
          assert(checks, "Loading animation appears during sample render", doc.querySelector("#mapHost")?.classList.contains("is-rendering"));
          await waitFor(() => doc.querySelectorAll("#projectTable tbody tr").length > 0, 12000);
          const sampleLoadSnapshot = await waitFor(() => {
            const snapshot = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot();
            return snapshot?.samples.length > samplesBeforeLoad && snapshot;
          }, 12000);
          if (measurePerformance) {
            const samplesBeforeAutoPlace = sampleLoadSnapshot.samples.length;
            doc.querySelector("#canvasAutoPlaceBtn").click();
            try {
              await waitFor(() => {
                const snapshot = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE?.snapshot();
                return snapshot?.samples.length > samplesBeforeAutoPlace && snapshot.latestByKind.autoPlace;
              }, 60000);
            } catch (_error) {
              throw new Error("Auto-place did not complete or record a performance timing within 60 seconds");
            }
          }
        }
        const performanceApi = frame.contentWindow.PLOTYPUS_RENDER_PERFORMANCE;
        const performanceSnapshot = performanceApi?.snapshot();
        assert(checks, "Render performance telemetry is available", Boolean(performanceSnapshot?.samples.length && performanceApi?.budgets?.renderMs));
        if (loadSample) {
          const latestRender = performanceSnapshot.latestByKind.render;
          assert(checks, "Sample render uses the configured render budget", latestRender.budgetMs === performanceApi.budgets.renderMs && latestRender.overBudget === (latestRender.totalMs > latestRender.budgetMs), `${latestRender.totalMs} / ${latestRender.budgetMs} ms`);
        }
        if (measurePerformance) {
          const latestAutoPlace = performanceSnapshot.latestByKind.autoPlace;
          assert(checks, "Sample auto-place uses the configured auto-place budget", latestAutoPlace.budgetMs === performanceApi.budgets.autoPlaceMs && latestAutoPlace.overBudget === (latestAutoPlace.totalMs > latestAutoPlace.budgetMs), `${latestAutoPlace.totalMs} / ${latestAutoPlace.budgetMs} ms`);
          assert(checks, "Scheduled render telemetry includes queue time", performanceSnapshot.latestByKind.autoPlace.source === "scheduled" && performanceSnapshot.latestByKind.autoPlace.queueMs >= 0, `${performanceSnapshot.latestByKind.autoPlace.source}, ${performanceSnapshot.latestByKind.autoPlace.queueMs} ms`);
        }
        const mapScaleReadout = doc.querySelector("#canvasZoomReadout");
        if (mapScaleReadout) {
          const readoutText = mapScaleReadout.textContent.trim();
          assert(checks, "Canvas toolbar uses rounded map scale readout", /^Map \d+%$/.test(readoutText), readoutText);
        }
        const readonlyStateApi = frame.contentWindow.PLOTYPUS_APP_STATE_READONLY;
        const readonlySnapshot = readonlyStateApi?.getSnapshot?.();
        assert(checks, "Read-only app state bridge exposes workspace and project counts", Boolean(readonlySnapshot && readonlySnapshot.activeWorkspace === doc.body.dataset.workspaceView && Number(readonlySnapshot.projectPoints?.rowCount || 0) === doc.querySelectorAll("#projectTable tbody tr").length), JSON.stringify(readonlySnapshot || null));
        assert(checks, "Read-only app state bridge exposes project row previews", Boolean(readonlySnapshot?.projectPoints?.previewRows?.length && readonlySnapshot.projectPoints.previewRows[0].name && ["blank", "callout", "mapped", "missing"].includes(readonlySnapshot.projectPoints.previewRows[0].status)), JSON.stringify(readonlySnapshot?.projectPoints?.previewRows || null));
        assert(checks, "Read-only app state bridge exposes baselayer row previews", Boolean(readonlySnapshot?.mapBaselayer?.previewRows?.length && readonlySnapshot.mapBaselayer.previewRows[0].name && /^#[0-9a-f]{6}$/i.test(readonlySnapshot.mapBaselayer.previewRows[0].colour || "")), JSON.stringify(readonlySnapshot?.mapBaselayer || null));
        assert(checks, "Read-only app state bridge exposes command bar state", Boolean(readonlySnapshot?.commandBar && typeof readonlySnapshot.commandBar.canUndo === "boolean" && ["en", "fr"].includes(readonlySnapshot.commandBar.uiLanguage) && ["en", "fr"].includes(readonlySnapshot.commandBar.mapLanguage) && typeof readonlySnapshot.commandBar.mapDetailsMissingCount === "number"), JSON.stringify(readonlySnapshot?.commandBar || null));
        assert(checks, "Read-only app state bridge exposes Properties fact sections", Boolean(readonlySnapshot?.properties?.sections?.length && readonlySnapshot.properties.sections[0].rows?.some(row => row.label && row.value && ["editable", "automatic"].includes(row.origin))), JSON.stringify(readonlySnapshot?.properties?.sections || null));
        assert(checks, "Read-only app state bridge exposes workspace summary metrics", Boolean(readonlySnapshot?.workspaceSummary?.metrics?.length >= 4 && readonlySnapshot.workspaceSummary.metrics.some(metric => metric.key === "quality")), JSON.stringify(readonlySnapshot?.workspaceSummary || null));
        let readonlySnapshotEvents = 0;
        frame.contentWindow.addEventListener("plotypus:state-snapshot", () => {
          readonlySnapshotEvents += 1;
        }, { once: true });
        doc.querySelector("[data-ui-language='fr']")?.click();
        await waitFor(() => readonlySnapshotEvents > 0 && frame.contentWindow.PLOTYPUS_APP_STATE_READONLY?.getSnapshot?.().locale === "fr", 2000);
        assert(checks, "Read-only app state bridge publishes updates", readonlySnapshotEvents === 1 && frame.contentWindow.PLOTYPUS_APP_STATE_READONLY.getSnapshot().locale === "fr");
        doc.querySelector("[data-ui-language='en']")?.click();
        await waitFor(() => doc.documentElement.lang === "en", 2000);
        if (reactCommands) {
          readonlyStateApi.runCommandBarCommand?.({ open: true, type: "set-export-menu-open" });
          await waitFor(() => readonlyStateApi.getSnapshot().commandBar.exportMenuOpen === true && doc.querySelector("#exportMenu")?.hidden === false, 2000);
          assert(checks, "Feature-flagged command bar bridge reaches vanilla app state", readonlyStateApi.getSnapshot().commandBar.exportMenuOpen === true && doc.querySelector("#exportMenu")?.hidden === false);
          readonlyStateApi.runCommandBarCommand?.({ open: false, type: "set-export-menu-open" });
          await waitFor(() => readonlyStateApi.getSnapshot().commandBar.exportMenuOpen === false && doc.querySelector("#exportMenu")?.hidden === true, 2000);
        }
        if (reactCommandBar) {
          const reactCommandBarRoot = await waitFor(() => {
            const root = doc.querySelector("#reactCommandBarRoot");
            return root && !root.hidden && root.querySelector(".react-command-bar") ? root : null;
          }, 3000);
          const legacyCommandBar = doc.querySelector(".app-ribbon.command-bar");
          assert(checks, "React command bar is mounted behind the feature flag", Boolean(reactCommandBarRoot && !reactCommandBarRoot.hidden && reactCommandBarRoot.querySelector(".react-command-bar")));
          assert(checks, "React command bar hides the vanilla command bar", Boolean(legacyCommandBar?.hidden));
          assert(checks, "React command bar renders production shell controls", /Plotypus/.test(visibleText(reactCommandBarRoot)) && /Open|Ouvrir/.test(visibleText(reactCommandBarRoot)) && /Export|Exporter/.test(visibleText(reactCommandBarRoot)), visibleText(reactCommandBarRoot));
        }
        if (reactWorkspaceShell) {
          const getReactWorkspaceRootState = () => {
            const root = doc.querySelector("#reactWorkspaceShellRoot");
            return root
              ? `hidden=${root.hidden}; children=${root.children.length}; text=${visibleText(root)}`
              : "missing";
          };
          await waitFor(() => doc.querySelector("#reactWorkspaceShellRoot"), 3000);
          const reactWorkspaceShellRoot = doc.querySelector("#reactWorkspaceShellRoot");
          const legacyWorkspaceBand = doc.querySelector(".workspace-nav-band");
          assert(checks, "React workspace shell is mounted behind the feature flag", Boolean(reactWorkspaceShellRoot && !reactWorkspaceShellRoot.hidden && reactWorkspaceShellRoot.querySelector(".react-workspace-shell")), getReactWorkspaceRootState());
          assert(checks, "React workspace shell hides the vanilla workspace band", Boolean(legacyWorkspaceBand?.hidden));
          assert(checks, "React workspace shell renders workspace tabs and summary", /Map|Carte/.test(visibleText(reactWorkspaceShellRoot)) && /Project points|Points de projet/.test(visibleText(reactWorkspaceShellRoot)) && /Rows|Lignes/.test(visibleText(reactWorkspaceShellRoot)), visibleText(reactWorkspaceShellRoot));
          reactWorkspaceShellRoot.querySelector("button[role='tab'][aria-selected='false']")?.click();
          await waitFor(() => readonlyStateApi.getSnapshot().activeWorkspace !== "preview", 2000);
          assert(checks, "React workspace shell tab command reaches vanilla app state", readonlyStateApi.getSnapshot().activeWorkspace !== "preview", readonlyStateApi.getSnapshot().activeWorkspace);
        }

        if (requestedDialog) {
          const dialogMap = {
            "map-details": "#mapDetailsDialog",
            "csv-map": "#csvMapDialog",
            "point-catalog": "#pointCatalogDialog",
            "shortcuts": "#shortcutsOverlay",
            "export-menu": "#exportMenu",
            "project-load-error": "#statusBox"
          };
          const dialogSelector = dialogMap[requestedDialog];
          if (!dialogSelector) throw new Error(`Unknown dialog: ${requestedDialog}`);
          if (requestedDialog === "map-details") {
            const trigger = doc.querySelector("#mapDetailsBtn");
            trigger.focus();
            trigger.click();
            await waitFor(() => doc.querySelector(dialogSelector)?.hidden === false);
            const dialog = doc.querySelector(dialogSelector);
            assert(checks, "Map details dialog opens", !dialog.hidden);
            if (reactMapDetails) {
              assert(checks, "React Map details implementation is mounted", Boolean(dialog.querySelector("#reactMapDetailsDialogRoot:not([hidden])")) && Boolean(dialog.querySelector("#mapDetailsForm[hidden]")));
            }
            assert(checks, "Map details exposes modal semantics", dialog.getAttribute("role") === "dialog" && dialog.getAttribute("aria-modal") === "true" && dialog.getAttribute("aria-labelledby") === "mapDetailsTitle");
            assert(checks, "Map details starts on the English title", doc.activeElement === doc.querySelector("#mapTitleEnInput"));
            assert(checks, "Map details does not block saving partial bilingual details", dialog.querySelectorAll("input[required], textarea[required]").length === 0);
            assert(checks, "Map details headings do not show publish-needed badges", dialog.querySelectorAll(".dialog-field-group .field-requirement").length === 0);
            assert(checks, "Accessibility publishing note remains visible", /not drawn in SVG or PNG exports/i.test(dialog.querySelector(".dialog-note")?.textContent || ""));
            setFieldValue(dialog.querySelector("#mapTitleEnInput"), "Draft title survives language switch");
            await waitFor(() => dialog.querySelector("#mapTitleEnInput")?.value === "Draft title survives language switch", 2000);
            const draftTitleBeforeLanguageSwitch = dialog.querySelector("#mapTitleEnInput")?.value || "";
            doc.querySelector("[data-ui-language='fr']")?.click();
            await waitFor(() => doc.documentElement.lang === "fr" && /Détails de la carte/.test(doc.querySelector("#mapDetailsTitle")?.textContent || "") && dialog.querySelector("#mapTitleEnInput"), 2000);
            await waitFor(() => dialog.querySelector("#mapTitleEnInput")?.value === "Draft title survives language switch", 2000);
            assert(checks, "Top language toggle switches Map details dialog copy to French", /Les deux langues sont requises/.test(dialog.querySelector(".dialog-note")?.textContent || "") && /Titre de la carte/.test(dialog.textContent || "") && /Enregistrer les détails de la carte/.test(dialog.textContent || ""), dialog.textContent || "");
            assert(checks, "Map details draft survives language remount", dialog.querySelector("#mapTitleEnInput")?.value === "Draft title survives language switch", JSON.stringify({
              after: dialog.querySelector("#mapTitleEnInput")?.value || "",
              before: draftTitleBeforeLanguageSwitch
            }));
            assertNoRawUiKeys(checks, "Map details dialog does not show raw translation keys in French", dialog);
            assertNoKnownEnglishUi(checks, "Map details dialog does not show known English UI phrases in French", [dialog]);
            assertNoRawUiKeysInAttributes(checks, "Map details dialog attributes do not show raw translation keys in French", [dialog]);
            assertNoKnownEnglishUiInAttributes(checks, "Map details dialog attributes do not show known English UI phrases in French", [dialog]);
            setFieldValue(dialog.querySelector("#mapTitleEnInput"), "");
            setFieldValue(dialog.querySelector("#mapTitleFrInput"), "Titre provisoire");
            setFieldValue(dialog.querySelector("#mapTextEnInput"), "");
            setFieldValue(dialog.querySelector("#mapTextFrInput"), "");
            const mapDetailsForm = dialog.querySelector("#mapDetailsForm");
            if (mapDetailsForm && !mapDetailsForm.hidden) {
              mapDetailsForm.dispatchEvent(new frame.contentWindow.Event("submit", { bubbles: true, cancelable: true }));
            } else {
              Array.from(dialog.querySelectorAll("button")).find(button => /Save map details|Enregistrer les détails de la carte/.test(button.textContent || ""))?.click();
            }
            await waitFor(() => dialog.hidden === true);
            assert(checks, "Map details can save while fields are still missing", dialog.hidden && doc.querySelector("#mapDetailsBtn")?.classList.contains("has-warning"));
            trigger.click();
            await waitFor(() => dialog.hidden === false);
            dispatchKey(doc, "Escape");
            assert(checks, "Escape closes Map details", dialog.hidden);
            assert(checks, "Map details restores trigger focus", doc.activeElement === trigger);
            trigger.click();
            await waitFor(() => dialog.hidden === false);
          }
          if (requestedDialog === "csv-map") {
            const input = doc.querySelector("#csvInput");
            const transfer = new frame.contentWindow.DataTransfer();
            transfer.items.add(new frame.contentWindow.File([
              "Project,Project FR,Type,Priority,Longitude,Latitude\nTest project,Projet test,Referred Project,2,-75.7,45.4"
            ], "mapped-sample.csv", { type: "text/csv" }));
            Object.defineProperty(input, "files", { configurable: true, value: transfer.files });
            input.dispatchEvent(new frame.contentWindow.Event("change", { bubbles: true }));
            await waitFor(() => doc.querySelector(dialogSelector)?.hidden === false && doc.querySelectorAll("#csvMapRows .csv-map-row").length === 6, 8000);
            const dialog = doc.querySelector(dialogSelector);
            const mappings = Array.from(dialog.querySelectorAll("#csvMapRows select"));
            assert(checks, "CSV mapping dialog opens", !dialog.hidden);
            assert(checks, "CSV mapping exposes modal semantics", dialog.getAttribute("role") === "dialog" && dialog.getAttribute("aria-modal") === "true" && dialog.getAttribute("aria-labelledby") === "csvMapTitle");
            assert(checks, "CSV mapping starts on the English-name mapping", doc.activeElement === dialog.querySelector("[data-csv-target='name'] select"), `${doc.activeElement?.tagName || "none"}#${doc.activeElement?.id || ""}`);
            assert(checks, "All supported Plotypus fields are shown", mappings.length === 6);
            assert(checks, "Detected columns are auto-matched", mappings.every(select => Boolean(select.value)));
            assert(checks, "Required mappings enable import", doc.querySelector("#confirmCsvMapBtn")?.disabled === false);
            assert(checks, "Source samples are visible", Array.from(dialog.querySelectorAll(".csv-map-sample")).some(sample => /Test project/.test(sample.textContent || "")));
            doc.querySelector("[data-ui-language='fr']")?.click();
            await waitFor(() => doc.documentElement.lang === "fr" && /Associer les colonnes CSV/.test(doc.querySelector("#csvMapTitle")?.textContent || ""), 2000);
            assert(checks, "Top language toggle switches CSV mapping dialog copy to French", /Champ Plotypus/.test(dialog.textContent || "") && /Colonne du CSV/.test(dialog.textContent || "") && /Nom anglais du projet/.test(dialog.textContent || "") && /Requis/.test(dialog.textContent || "") && /Non associé/.test(dialog.textContent || "") && /Importer les lignes associées/.test(dialog.textContent || ""), dialog.textContent || "");
            assertNoRawUiKeys(checks, "CSV mapping dialog does not show raw translation keys in French", dialog);
            assertNoKnownEnglishUi(checks, "CSV mapping dialog does not show known English UI phrases in French", [dialog], [/mapped-sample\.csv/i]);
            assertNoRawUiKeysInAttributes(checks, "CSV mapping dialog attributes do not show raw translation keys in French", [dialog]);

        assert(checks, "Escape closes export menu", exportMenu.hidden && exportButton.getAttribute("aria-expanded") === "false");
        assert(checks, "Escape restores trigger focus", doc.activeElement === exportButton);

        dispatchKey(exportButton, "ArrowDown");
        assert(checks, "Arrow Down opens and focuses first command", !exportMenu.hidden && doc.activeElement === pngButton);
        dispatchKey(pngButton, "ArrowDown");
        assert(checks, "Arrow keys move through export commands", doc.activeElement === svgButton);
        dispatchKey(svgButton, "Escape");

        projectTab.click();
        assert(checks, "Workspace navigation activates Project points", projectTab.classList.contains("is-active") && doc.body.dataset.workspaceView === "projects");
        mapTab.click();
        assert(checks, "Workspace navigation returns to Map", mapTab.classList.contains("is-active") && doc.body.dataset.workspaceView === "preview");

        exportButton.click();
        assert(checks, "Export menu is left open for screenshot review", !exportMenu.hidden);
        const failed = checks.filter(check => !check.pass);
        result.textContent = JSON.stringify({
          status: failed.length ? "failed" : "ok",
          viewport: { width: innerWidth, height: innerHeight },
          checks,
          failures: failed.length
        }, null, 2);
      } catch (error) {
        result.textContent = JSON.stringify({ status: "error", message: error.message, checks }, null, 2);
      }
    });
  </script>
</body>
</html>
